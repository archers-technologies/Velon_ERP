name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: velon
          POSTGRES_PASSWORD: velon_ci
          POSTGRES_DB: velon_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://velon:velon_ci@localhost:5432/velon_erp_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
      SUPER_ADMIN_EMAIL: info@velonerp.com
      SUPER_ADMIN_PASSWORD: CiTestPassword123!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Prisma generate & migrate
        run: |
          npm run db:generate
          npm run migrate:deploy -w @velon/database

      - name: Lint web
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build packages & API
        run: npm run build:api

      - name: Build web
        run: VITE_API_URL=http://localhost:3001 npm run build:web

      - name: Security gate (tenant isolation)
        env:
          AUTH_OTP_SECRET: ci-otp-secret-minimum-32-characters-long
        run: npm run test:security
